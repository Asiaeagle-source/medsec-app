<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AE MED Hub · 工單接單工作台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="medsec-common.css">
  <style>
    /* 與信件分流頁(mail-triage)同一套視覺語彙 */
    :root{ --red:#dc2626; --amber:#c2790b; --blue:#2563eb; --green:#1a7f45; }
    .mt-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:13.5px;color:#475569;margin-bottom:18px}
    .mt-bar b{color:#1d2330}
    .mt-tabs{display:flex;gap:22px;border-bottom:1px solid #e8e9ef;margin-bottom:22px}
    .mt-tab{font-size:15px;color:#475569;padding:0 2px 12px;cursor:pointer;border:0;background:none;border-bottom:2px solid transparent;font-family:inherit}
    .mt-tab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
    .mt-tab .cnt{display:none;min-width:18px;margin-left:5px;padding:0 5px;font-size:11px;line-height:17px;text-align:center;border-radius:9px;background:#eef0f4;color:#6b7280;font-weight:600}
    .mt-tab .cnt.show{display:inline-block}
    .mt-tab.on .cnt{background:var(--blue);color:#fff}
    .group-h{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;margin:8px 0 10px}
    .group-h .dot{width:9px;height:9px;border-radius:50%;display:inline-block}
    .group-h.zone{color:#334155} .group-h.zone .dot{background:#94a3b8}
    .mt-list{display:flex;flex-direction:column;gap:10px;margin-bottom:22px}
    .mt-card{background:#fff;border:1px solid #e8e9ef;border-radius:12px;padding:14px 16px}
    .badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;align-items:center}
    .seqtag{font-size:11.5px;padding:2px 9px;border-radius:7px;background:#1d2330;color:#fff;font-weight:600;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    .cat{font-size:11.5px;padding:2px 9px;border-radius:7px;font-weight:600}
    .cat.quote{background:#eef4ff;color:#2563eb}
    .cat.coding{background:#eef7ee;color:#2f8f3f}
    .cat.doc{background:#f3f0fb;color:#7c53c9}
    .cat.shipping{background:#fdf3df;color:#c2790b}
    .cat.other{background:#eef0f4;color:#6b7280}
    .due{font-size:11.5px;padding:2px 9px;border-radius:7px;font-weight:600}
    .due.overdue{background:#fdecec;color:var(--red)}
    .due.soon{background:#fdf3df;color:var(--amber)}
    .due.far{background:#eef0f4;color:#6b7280}
    .subj{font-size:14.5px;font-weight:600;margin-bottom:3px}
    .from{font-size:12.5px;color:#9aa0ab;margin-bottom:6px}
    .sum{font-size:13px;color:#475569;line-height:1.6;white-space:pre-wrap}
    .foot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:11px;padding-top:11px;border-top:1px solid #e8e9ef;flex-wrap:wrap}
    .claiminfo{font-size:12.5px;color:#6b7280}
    .claiminfo b{color:#334155;font-weight:600}
    .wait-note{font-size:12.5px;color:#6b7280}
    .dw{font-size:12px;color:#6b7280} .dw.warn{color:var(--amber);font-weight:600}
    .readonly-note{font-size:12.5px;color:#8b7300;background:#fdf6e3;border-radius:7px;padding:3px 10px}
    .doneinfo{display:flex;gap:9px;flex-wrap:wrap;align-items:center;font-size:12.5px;color:#475569}
    .doneinfo .tag{background:#eaf7ee;color:var(--green);padding:2px 9px;border-radius:7px;font-weight:600;font-size:11.5px}
    .stars{color:#e8a400;font-size:14px;letter-spacing:1px}
    .acts{display:flex;gap:8px}
    .btn-claim,.btn-done,.btn-info{font-size:12.5px;font-family:inherit;border-radius:8px;padding:6px 13px;cursor:pointer;border:1px solid transparent;font-weight:600}
    .btn-claim{color:var(--blue);background:#eef4ff;border-color:#d3e0fb}
    .btn-claim:hover{background:#dfeaff}
    .btn-info{color:var(--amber);background:#fdf3df;border-color:#f0dcae}
    .btn-info:hover{filter:brightness(.97)}
    .btn-done{color:#fff;background:var(--blue);border-color:var(--blue)}
    .btn-done:hover{filter:brightness(.96)}
    .toggle{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:#475569;cursor:pointer;user-select:none;margin-bottom:14px}
    .toggle input{width:15px;height:15px}
    /* V2.1 修改要求橘條 */
    .rev{margin:0 0 10px;border:1px solid #f0c987;background:#fff7ec;border-radius:9px;overflow:hidden}
    .rev>summary{list-style:none;cursor:pointer;padding:8px 12px;font-size:12.5px;font-weight:700;color:#b45309}
    .rev>summary::-webkit-details-marker{display:none}
    .rev[open]>summary{border-bottom:1px solid #f0c987}
    .rev .body{padding:10px 12px;font-size:12.5px;color:#475569}
    .rev .note{white-space:pre-wrap;margin-bottom:8px;color:#334155}
    .rev .item{padding:4px 0;border-top:1px dashed #eaddc4}
    /* V2.1 附件區 */
    .att{margin-top:10px;border-top:1px solid #eef0f4;padding-top:9px}
    .att>summary{list-style:none;cursor:pointer;font-size:12.5px;color:#475569;font-weight:600}
    .att>summary::-webkit-details-marker{display:none}
    .att .file{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:12.5px;color:#475569;padding:5px 0}
    .att .file .k{font-size:10.5px;padding:1px 6px;border-radius:6px;margin-left:6px}
    .att .file .k.request{background:#eef4ff;color:var(--blue)}
    .att .file .k.deliverable{background:#eaf7ee;color:var(--green)}
    .btn-open{font-size:12px;font-family:inherit;border:1px solid #d3e0fb;background:#eef4ff;color:var(--blue);border-radius:7px;padding:3px 10px;cursor:pointer;font-weight:600}
    .btn-up{font-size:12px;font-family:inherit;border:1px dashed #cbd5e1;background:#f8fafc;color:#475569;border-radius:7px;padding:5px 11px;cursor:pointer;margin-top:7px}
    /* modal(要求補件 / 結案 說明 / 確認)*/
    .mt-modal-mask{position:fixed;inset:0;background:rgba(15,23,42,.42);display:flex;align-items:center;justify-content:center;z-index:60}
    .mt-modal{background:#fff;border-radius:14px;padding:22px;width:min(400px,92vw);box-shadow:0 14px 44px rgba(0,0,0,.2)}
    .mt-modal h3{font-size:16px;margin:0 0 4px}
    .mt-modal p{font-size:12.5px;color:#8b94a3;margin:0 0 14px}
    .mt-modal textarea{width:100%;box-sizing:border-box;font-family:inherit;font-size:14px;padding:10px 12px;border:1px solid #dfe3ea;border-radius:9px;outline:none;margin-bottom:16px;resize:vertical}
    .mt-modal textarea:focus{border-color:var(--blue)}
    .mt-modal .row{display:flex;gap:10px;justify-content:flex-end}
    .mt-modal button{font-family:inherit;font-size:13.5px;padding:8px 16px;border-radius:9px;cursor:pointer;border:1px solid transparent;font-weight:600}
    .mt-modal .cancel{background:#f1f3f7;color:#475569}
    .mt-modal .ok{background:var(--blue);color:#fff}
    .mt-modal .ok:disabled{opacity:.45;cursor:default}
    /* toast */
    .mt-toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:#1d2330;color:#fff;font-size:13px;padding:10px 18px;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:70;opacity:0;pointer-events:none;transition:opacity .2s;max-width:80vw;text-align:center}
    .mt-toast.show{opacity:1}
    .mt-toast.err{background:#b3261e}
    .mt-toast.ok{background:var(--green)}
  </style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="medsec-common.js"></script>
<script>
// ============================================================
// 工單接單工作台(MedSec 端)V2.1 — 自動預派 / 期限 / 附件 / 修改流
//  - 守門:secretary。狀態寫入一律走 RPC ticket_action(claim/need_info/resolve)。
//  - V2.1 讀:due_date、files(jsonb)、revision_count/note/items;days_waiting 讀 view。
//  - 交付檔上傳:storage.upload('{ticket_id}/{檔名}') → ticket_attach_file 記錄
//    (kind='deliverable';by/at 由 RPC 補)。同名 409 → 檔名前加時間戳重試一次。
//
// ⚠️ 後端契約假設區(medsec_tickets / RPC / view 由 Lynn 建於線上,不在 repo)。
//    欄名/RPC/view/bucket 不同只改這個 T 物件。
// ============================================================
const T = {
  table:   'medsec_tickets',
  pendingView: 'v_tickets_pending_sales',   // need_info/resolved + days_waiting
  bucket:  'ticket-files',
  rpc:     'ticket_action',
  rpcAttach: 'ticket_attach_file',
  actions: { claim: 'claim', needInfo: 'need_info', resolve: 'resolve' },
  P:       { id: 'p_ticket_id', action: 'p_action', note: 'p_note' },
  col: {
    id:'id', seq:'seq', category:'category', hospitalId:'hospital_id',
    title:'title', description:'description', status:'status',
    assignee:'assignee_id', requester:'requester_id',
    createdAt:'created_at', rating:'rating', ratingComment:'rating_comment',
    // V2.1
    dueDate:'due_date', files:'files',
    revisionCount:'revision_count', revisionNote:'revision_note', revisionItems:'revision_items',
  },
};

const CAT = { quote:'報價', coding:'建碼', doc:'文件', shipping:'出貨', other:'其他' };
const CLOSED_WINDOW_DAYS = 14;

let STATE = {
  tickets: [], filter: 'submitted', showAll: false,
  profileMap: {}, hospitalMap: {}, me: null, mock: false,
};

// ---- MOCK ----
function isoAgo(d){ return new Date(Date.now() - d*864e5).toISOString(); }
function dateAgo(d){ return new Date(Date.now() - d*864e5).toISOString().slice(0,10); }
const MOCK = [
  { id:'t-1', seq:1042, category:'quote', hospitalId:'NTUH', hospital:'台大', title:'MR8 磨鑽耗材報價需求', description:'客戶下週要正式報價。', status:'submitted', assignee:null, requester:'張業務', createdAt:isoAgo(0.2), dueDate:dateAgo(-1), files:[{name:'需求規格.pdf',path:'t-1/需求規格.pdf',kind:'request',by:'u-2',at:isoAgo(0.2)}] },
  { id:'t-2', seq:1041, category:'coding', hospitalId:'VGHKS', hospital:'高榮', title:'CENTERPIECE 2 建碼協助', description:'整理建碼文件包。', status:'submitted', assignee:'me', requester:'李業務', createdAt:isoAgo(0.5), dueDate:dateAgo(1) },
  { id:'t-3', seq:1038, category:'shipping', hospitalId:'CGMH', hospital:'長庚', title:'寄售品補貨進度', description:'客戶問補貨到哪了。', status:'in_progress', assignee:'me', requester:'王業務', createdAt:isoAgo(1), dueDate:dateAgo(-4), revisionCount:1, revisionNote:'客戶說要改成含稅價,另附上次的驗收單。', revisionItems:[{seq:1,instruction:'報價改含稅'},{seq:2,instruction:'補上次驗收單'}], files:[{name:'需求.pdf',path:'t-3/需求.pdf',kind:'request',by:'u-2',at:isoAgo(1)},{name:'報價v1.xlsx',path:'t-3/報價v1.xlsx',kind:'deliverable',by:'u-me',at:isoAgo(0.6)}] },
  { id:'t-4', seq:1035, category:'doc', hospitalId:'NCKU', hospital:'成大', title:'仿單/材質資料補件', description:'委員會要補仿單。', status:'in_progress', assignee:'other', requester:'陳業務', createdAt:isoAgo(1.5) },
  { id:'t-5', seq:1030, category:'quote', hospitalId:'MMH', hospital:'馬偕', title:'折讓後報價確認', description:'原始需求。\n【補充】客戶接受折讓 8%。', status:'need_info', assignee:'me', requester:'林業務', createdAt:isoAgo(2), daysWaiting:1 },
  { id:'t-6', seq:1022, category:'other', hospitalId:'CCH', hospital:'彰基', title:'器械保養排程', description:'安排保養。', status:'resolved', assignee:'me', requester:'吳業務', createdAt:isoAgo(4), daysWaiting:4, files:[{name:'排程表.pdf',path:'t-6/排程表.pdf',kind:'deliverable',by:'u-me',at:isoAgo(4)}] },
  { id:'t-7', seq:1018, category:'quote', hospitalId:'CYCH', hospital:'嘉基', title:'骨鑽耗材報價', description:'已交付。', status:'confirmed', assignee:'me', requester:'黃業務', createdAt:isoAgo(5), rating:5, ratingComment:'很快,謝謝!' },
];

function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function fmtDT(ts){ try{ return new Date(ts).toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}); }catch(e){ return ''; } }
function fmtDate(d){ try{ return new Date(d+'T00:00:00').toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'}); }catch(e){ return String(d); } }
function withinDays(ts,n){ try{ return (Date.now()-new Date(ts).getTime())/864e5 <= n; }catch(e){ return false; } }
function nameOf(uuid){ if(!uuid) return null; const p=STATE.profileMap[uuid]; return p?(p.nickname||p.name||p.employee_id||null):null; }
function hospOf(id){ if(!id) return null; return STATE.hospitalMap[id] || id; }

// 期限:{cls, label, rank(0逾期/1快到期/2其他)}
function dueInfo(m){
  if(!m.dueDate) return { cls:'far', label:null, rank:2 };
  const today = new Date(); today.setHours(0,0,0,0);
  const due = new Date(m.dueDate+'T00:00:00');
  const days = Math.round((due - today)/864e5);
  if(days < 0)  return { cls:'overdue', label:`逾期 ${-days} 天`, rank:0 };
  if(days <= 3) return { cls:'soon', label:(days===0?'今天到期':days===1?'明天到期':`${days} 天內到期`), rank:1 };
  return { cls:'far', label:fmtDate(m.dueDate), rank:2 };
}
// 排序:逾期 > 快到期 > 其他;各組內 created_at desc
function sortByDue(rows){
  return rows.slice().sort((a,b)=>{
    const ra=dueInfo(a).rank, rb=dueInfo(b).rank;
    if(ra!==rb) return ra-rb;
    return new Date(b.createdAt) - new Date(a.createdAt);
  });
}

function mapT(x){
  return {
    id: x[T.col.id], seq: x[T.col.seq], category: x[T.col.category],
    hospitalId: x[T.col.hospitalId], hospital: hospOf(x[T.col.hospitalId]),
    title: x[T.col.title], description: x[T.col.description],
    status: x[T.col.status], assignee: x[T.col.assignee] || null,
    requester: nameOf(x[T.col.requester]), createdAt: x[T.col.createdAt],
    rating: x[T.col.rating] || null, ratingComment: x[T.col.ratingComment] || null,
    dueDate: x[T.col.dueDate] || null,
    files: Array.isArray(x[T.col.files]) ? x[T.col.files] : [],
    revisionCount: x[T.col.revisionCount] || 0,
    revisionNote: x[T.col.revisionNote] || null,
    revisionItems: Array.isArray(x[T.col.revisionItems]) ? x[T.col.revisionItems] : [],
    daysWaiting: null,   // 由 v_tickets_pending_sales 補
  };
}

// ---- 載入 ----
async function loadProfiles(){
  const { data, error } = await supa.from('profiles').select('id, name, nickname, employee_id');
  if (error){ console.warn('[tickets] profiles 載入失敗', error); return {}; }
  const m={}; for(const p of (data||[])) m[p.id]=p; return m;
}
async function loadHospitals(){
  const { data, error } = await supa.from('medsec_hospitals').select('id, name_short');
  if (error){ console.warn('[tickets] hospitals 載入失敗,醫院以院碼顯示', error); return {}; }
  const m={}; for(const h of (data||[])) m[h.id]=h.name_short; return m;
}
async function loadTickets(){
  // 讀全部(不下 status where),render() 依 status 分頁過濾。可見列由 medsec_tickets RLS 決定。
  const { data, error } = await supa.from(T.table).select('*').order(T.col.createdAt, { ascending:false });
  if (error){ console.error('[tickets] 讀取失敗', error); toast('工單讀取失敗:' + (error.message || error), 'err'); return null; }
  return (data||[]).map(mapT);
}
// days_waiting:need_info/resolved 從 view 撈,回 { id: days_waiting }
async function loadDaysWaiting(){
  const { data, error } = await supa.from(T.pendingView).select('*');
  if (error){ console.warn('[tickets] v_tickets_pending_sales 讀取失敗,等待天數不顯示', error); return {}; }
  const m={}; for(const r of (data||[])){ if(r.id!=null) m[r.id]=r.days_waiting; } return m;
}
async function reload(){
  const t = await loadTickets();
  if (t){ const dw = await loadDaysWaiting(); for(const x of t) x.daysWaiting = dw[x.id] ?? null; STATE.tickets = t; }
  render();
}

// ---- 卡片片段 ----
function dueBadge(m){ const d=dueInfo(m); return d.label ? `<span class="due ${d.cls}">${esc(d.label)}</span>` : ''; }

function revBanner(m){
  if(!(m.status==='in_progress' && m.revisionCount>0)) return '';
  const items = (m.revisionItems||[]).map((it,i)=>{
    const seq = (it && it.seq!=null) ? it.seq : (i+1);
    const ins = (it && (it.instruction||it.text||it.content)) || (typeof it==='string'?it:'');
    return `<div class="item">第 ${esc(seq)} 項:${esc(ins)}</div>`;
  }).join('');
  return `<details class="rev" open>
    <summary>⚠ 業務要求修改(第 ${esc(m.revisionCount)} 輪)</summary>
    <div class="body">
      ${m.revisionNote ? `<div class="note">${esc(m.revisionNote)}</div>` : ''}
      ${items || '<div class="dw">(無逐項說明)</div>'}
    </div>
  </details>`;
}
function fileRow(f){
  const kcls = f.kind==='deliverable' ? 'deliverable' : 'request';
  const klabel = f.kind==='deliverable' ? '交付' : '需求';
  return `<div class="file"><span>${esc(f.name || f.path)}<span class="k ${kcls}">${klabel}</span></span>
    <button class="btn-open" onclick="onOpenFile('${esc(f.path)}')">開啟</button></div>`;
}
function attachSection(m){
  const files = m.files || [];
  const canDeliver = m.status==='in_progress' && m.assignee===(STATE.me && STATE.me.id);
  const body = files.length ? files.map(fileRow).join('') : '<div class="dw" style="padding:5px 0">尚無附件</div>';
  return `<details class="att">
    <summary>📎 附件 (${files.length})</summary>
    <div>
      ${body}
      ${canDeliver ? `<button class="btn-up" onclick="onUploadDeliverable('${esc(m.id)}')">＋ 上傳交付檔</button>` : ''}
    </div>
  </details>`;
}

// ---- 狀態左側 / 動作 ----
function ticketLeft(m){
  const mine = m.assignee === (STATE.me && STATE.me.id);
  if (m.status === 'submitted')   return `<div class="wait-note">待接單</div>`;
  if (m.status === 'in_progress') return `<div class="claiminfo">承辦 <b>${esc(nameOf(m.assignee) || (mine?'我':'—'))}</b></div>`;
  if (m.status === 'need_info')   return `<div class="readonly-note">⏳ 已要求補件,等待業務補充</div>`;
  if (m.status === 'resolved'){
    const dw = m.daysWaiting;
    const dwHtml = (dw!=null) ? ` · <span class="dw${dw>=3?' warn':''}">等待 ${esc(dw)} 天</span>` : '';
    return `<div class="wait-note">✓ 已結案 · 待業務確認${dwHtml}</div>`;
  }
  if (m.status === 'confirmed'){
    const r = Math.max(0, Math.min(5, m.rating || 0));
    const stars = '★'.repeat(r) + '☆'.repeat(5 - r);
    return `<div class="doneinfo"><span class="tag">✓ 已確認</span>${m.rating?`<span class="stars">${stars}</span>`:''}${m.ratingComment?`<span>「${esc(m.ratingComment)}」</span>`:''}</div>`;
  }
  return '';
}
function ticketActs(m){
  const mine = m.assignee === (STATE.me && STATE.me.id);
  if (m.status === 'submitted')
    return `<div class="acts"><button class="btn-claim" onclick="onClaim('${esc(m.id)}')">接單</button></div>`;
  if (m.status === 'in_progress' && mine)
    return `<div class="acts"><button class="btn-info" onclick="onNeedInfo('${esc(m.id)}')">要求補件</button><button class="btn-done" onclick="onResolve('${esc(m.id)}')">結案</button></div>`;
  return '';
}
function card(m){
  return `<div class="mt-card" data-card="${esc(m.id)}">
    ${revBanner(m)}
    <div class="badges">
      <span class="seqtag">#${esc(m.seq)}</span>
      <span class="cat ${esc(m.category || 'other')}">${esc(CAT[m.category] || m.category || '其他')}</span>
      ${m.hospital ? `<span class="from" style="margin:0">${esc(m.hospital)}</span>` : ''}
      ${dueBadge(m)}
    </div>
    <div class="subj">${esc(m.title)}</div>
    <div class="from">提單 ${esc(m.requester || '—')} · ${esc(fmtDT(m.createdAt))}</div>
    ${m.description ? `<div class="sum">${esc(m.description)}</div>` : ''}
    ${attachSection(m)}
    <div class="foot">${ticketLeft(m)}${ticketActs(m)}</div>
  </div>`;
}

// ---- render ----
function setCnt(f, n){ const el=document.querySelector(`.mt-tab[data-f="${f}"] .cnt`); if(!el) return; el.textContent=n; el.classList.toggle('show', n>0); }
function emptyCard(msg){ return `<div class="mt-card"><div class="sum">${esc(msg)}</div></div>`; }
function listHtml(rows, label){ if(!rows.length) return emptyCard(`目前沒有${label}的工單。`); return `<div class="mt-list">${sortByDue(rows).map(card).join('')}</div>`; }

function render(){
  const me = STATE.me && STATE.me.id;
  const sub      = STATE.tickets.filter(t => t.status === 'submitted');
  const inprog   = STATE.tickets.filter(t => t.status === 'in_progress');
  const mineIP   = inprog.filter(t => t.assignee === me);
  const needinfo = STATE.tickets.filter(t => t.status === 'need_info');
  const closed   = STATE.tickets.filter(t => (t.status === 'resolved' || t.status === 'confirmed') && withinDays(t.createdAt, CLOSED_WINDOW_DAYS));

  document.getElementById('t-sub').textContent  = sub.length;
  document.getElementById('t-mine').textContent = mineIP.length;
  document.getElementById('t-need').textContent = needinfo.length;
  document.getElementById('t-upd').textContent  = new Date().toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' });

  setCnt('submitted', sub.length);
  setCnt('in_progress', mineIP.length);
  setCnt('need_info', needinfo.length);
  setCnt('resolved', closed.length);

  const view = document.getElementById('mt-view');
  const f = STATE.filter;

  // 待接單:分「指派給我(預派)」與「共池(未指派)」兩區
  if (f === 'submitted'){
    const mineZ = sortByDue(sub.filter(t => t.assignee === me));
    const poolZ = sortByDue(sub.filter(t => !t.assignee));
    view.innerHTML =
      `<div class="group-h zone"><span class="dot"></span>指派給我 (${mineZ.length})</div>`
      + (mineZ.length ? `<div class="mt-list">${mineZ.map(card).join('')}</div>` : emptyCard('目前沒有指派給你的待接單。'))
      + `<div class="group-h zone"><span class="dot"></span>共池 · 未指派 (${poolZ.length})</div>`
      + (poolZ.length ? `<div class="mt-list">${poolZ.map(card).join('')}</div>` : emptyCard('共池目前沒有待接單。'));
    return;
  }
  if (f === 'in_progress'){
    const rows = STATE.showAll ? inprog : mineIP;
    view.innerHTML =
      `<label class="toggle"><input type="checkbox" id="show-all" ${STATE.showAll?'checked':''}> 看全部(含其他業祕的處理中)</label>`
      + listHtml(rows, STATE.showAll ? '處理中' : '我處理中');
    const cb = document.getElementById('show-all');
    if (cb) cb.addEventListener('change', () => { STATE.showAll = cb.checked; render(); });
    return;
  }
  if (f === 'need_info'){ view.innerHTML = listHtml(needinfo, '待補件'); return; }
  view.innerHTML = listHtml(closed, '已結案');
}

// ---- 動作 ----
function findT(id){ return STATE.tickets.find(t => t.id === id) || null; }
async function callAction(id, action, note){
  const args = { [T.P.id]: id, [T.P.action]: action };
  if (note !== undefined) args[T.P.note] = note;
  return supa.rpc(T.rpc, args);
}

async function onClaim(id){
  const m = findT(id);
  if (!m || m.status !== 'submitted') return;
  const snap = { ...m };
  m.status = 'in_progress'; m.assignee = STATE.me && STATE.me.id;   // 樂觀:claim 後 assignee 歸接單人
  render();
  if (STATE.mock){ toast('已接單(demo)', 'ok'); return; }
  const { error } = await callAction(id, T.actions.claim);
  if (error){ Object.assign(m, snap); toast('接單失敗:' + (error.message || error) + '(可能已被接走,已重新整理)', 'err'); await reload(); }
  else toast('已接單', 'ok');
}
async function onNeedInfo(id){
  const m = findT(id);
  if (!m || m.status !== 'in_progress') return;
  const note = await askNote({ title:'要求補件', placeholder:'請說明需要業務補充什麼…', required:true });
  if (note === undefined) return;
  const snap = { ...m };
  m.status = 'need_info'; render();
  if (STATE.mock){ toast('已要求補件(demo)', 'ok'); return; }
  const { error } = await callAction(id, T.actions.needInfo, note);
  if (error){ Object.assign(m, snap); toast('要求補件失敗:' + (error.message || error), 'err'); await reload(); }
  else toast('已要求補件', 'ok');
}
async function onResolve(id){
  const m = findT(id);
  if (!m || m.status !== 'in_progress') return;
  // 沒有任何交付檔 → 二次確認
  const hasDeliverable = (m.files || []).some(f => f.kind === 'deliverable');
  if (!hasDeliverable){
    const go = await askConfirm('未附任何交付檔', '這張單目前沒有任何交付檔(kind=deliverable),確定要結案嗎?');
    if (!go) return;
  }
  const note = await askNote({ title:'結案', placeholder:'結案說明(選填)…', required:false });
  if (note === undefined) return;
  const p_note = note.trim() ? note.trim() : null;
  const snap = { ...m };
  m.status = 'resolved'; render();
  if (STATE.mock){ toast('已結案(demo)', 'ok'); return; }
  const { error } = await callAction(id, T.actions.resolve, p_note);
  if (error){ Object.assign(m, snap); toast('結案失敗:' + (error.message || error), 'err'); await reload(); }
  else toast('已結案,待業務確認', 'ok');
}

// 附件:開啟業務需求檔(私有 bucket → signed URL)
async function onOpenFile(path){
  if (STATE.mock){ toast('demo 模式無實檔', 'ok'); return; }
  try{
    const { data, error } = await supa.storage.from(T.bucket).createSignedUrl(path, 60);
    if (error || !data){ toast('開啟失敗:' + ((error && error.message) || '無 URL'), 'err'); return; }
    window.open(data.signedUrl, '_blank');
  }catch(e){ toast('開啟失敗:' + e.message, 'err'); }
}
// 檔名 sanitize:去路徑字元 / \ 與控制字元(bucket 內用 {ticket_id}/{檔名})
function sanitizeName(name){
  return (String(name||'').replace(/[\/\\]/g,'_').replace(/^\.+/,'').trim()) || 'file';
}
// 上傳交付檔:選檔 → storage.upload → ticket_attach_file 記錄。in_progress 且承辦=自己才給上傳。
async function onUploadDeliverable(id){
  const m = findT(id);
  if (!m || m.status !== 'in_progress' || m.assignee !== (STATE.me && STATE.me.id)) return;
  const input = document.createElement('input');
  input.type = 'file'; input.style.display = 'none';
  document.body.appendChild(input);
  input.addEventListener('change', async () => {
    const file = input.files && input.files[0];
    if (input.parentNode) document.body.removeChild(input);
    if (file) await doUploadDeliverable(m, file);
  });
  input.click();
}
async function doUploadDeliverable(m, file){
  if (STATE.mock){ toast('demo 模式不上傳', 'ok'); return; }
  const clean = sanitizeName(file.name);
  const bucket = supa.storage.from(T.bucket);
  toast('上傳中…', 'ok');
  // 1) 上傳到 {ticket_id}/{檔名};同名 409 → 檔名前加時間戳重試一次
  let path = `${m.id}/${clean}`;
  let up = await bucket.upload(path, file);
  if (up.error){
    const st = String(up.error.statusCode || up.error.status || '');
    const dup = st === '409' || /exist|conflict|duplicate/i.test(up.error.message || '');
    if (dup){
      path = `${m.id}/${Date.now()}-${clean}`;
      up = await bucket.upload(path, file);
    }
  }
  if (up.error){ toast('上傳失敗:' + (up.error.message || up.error), 'err'); return; }
  // 2) 記錄進 files jsonb(by/at 由 RPC 補);p_name 用原始顯示名,p_path 不含 bucket 前綴
  const { error } = await supa.rpc(T.rpcAttach, {
    p_ticket_id: m.id, p_name: file.name, p_path: path, p_kind: 'deliverable',
  });
  if (error){ toast('登錄失敗:' + (error.message || error), 'err'); return; }
  toast('交付檔已上傳', 'ok');
  await reload();
}

// ---- modal / toast ----
function askNote(opts){
  return new Promise(resolve => {
    const mask = document.createElement('div'); mask.className = 'mt-modal-mask';
    mask.innerHTML = `<div class="mt-modal">
      <h3>${esc(opts.title)}</h3>
      <p>${opts.required ? '請填寫說明(必填)' : '可留空直接確認'}</p>
      <textarea id="note-input" rows="3" placeholder="${esc(opts.placeholder || '')}"></textarea>
      <div class="row"><button class="cancel" type="button">取消</button><button class="ok" type="button"${opts.required ? ' disabled' : ''}>確認</button></div>
    </div>`;
    document.body.appendChild(mask);
    const ta = mask.querySelector('#note-input'); const okB = mask.querySelector('.ok');
    let closed = false;
    const close = (v) => { if (closed) return; closed = true; document.body.removeChild(mask); resolve(v); };
    if (opts.required) ta.addEventListener('input', () => { okB.disabled = !ta.value.trim(); });
    mask.querySelector('.cancel').onclick = () => close(undefined);
    okB.onclick = () => { if (opts.required && !ta.value.trim()) return; close(ta.value.trim() ? ta.value.trim() : ''); };
    ta.addEventListener('keydown', e => { if (e.key === 'Escape') close(undefined); });
    mask.addEventListener('mousedown', e => { if (e.target === mask) close(undefined); });
    setTimeout(() => ta.focus(), 0);
  });
}
function askConfirm(title, msg){
  return new Promise(resolve => {
    const mask = document.createElement('div'); mask.className = 'mt-modal-mask';
    mask.innerHTML = `<div class="mt-modal"><h3>${esc(title)}</h3><p>${esc(msg)}</p>
      <div class="row"><button class="cancel" type="button">取消</button><button class="ok" type="button">確定結案</button></div></div>`;
    document.body.appendChild(mask);
    let closed = false;
    const close = (v) => { if (closed) return; closed = true; document.body.removeChild(mask); resolve(v); };
    mask.querySelector('.cancel').onclick = () => close(false);
    mask.querySelector('.ok').onclick = () => close(true);
    mask.addEventListener('mousedown', e => { if (e.target === mask) close(false); });
  });
}
let _toastTimer = null;
function toast(msg, kind){
  let t = document.getElementById('mt-toast');
  if (!t){ t = document.createElement('div'); t.id = 'mt-toast'; document.body.appendChild(t); }
  t.className = 'mt-toast ' + (kind || '') + ' show';
  t.textContent = msg;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { t.className = 'mt-toast ' + (kind || ''); }, 2800);
}

// ---- init ----
(async function init(){
  const profile = await guardRole('secretary');
  if (!profile) return;
  STATE.me = profile;
  renderUserInfo(profile);
  hideLoading();

  document.querySelectorAll('.mt-tab').forEach(t => t.addEventListener('click', () => {
    document.querySelectorAll('.mt-tab').forEach(x => x.classList.remove('on'));
    t.classList.add('on');
    STATE.filter = t.dataset.f;
    render();
  }));

  [STATE.profileMap, STATE.hospitalMap] = await Promise.all([loadProfiles(), loadHospitals()]);
  const t = await loadTickets();
  if (t){
    const dw = await loadDaysWaiting();
    for (const x of t) x.daysWaiting = dw[x.id] ?? null;
    STATE.tickets = t; STATE.mock = false;
  } else {
    STATE.tickets = MOCK.map(m => ({ ...m, assignee: m.assignee === 'me' ? STATE.me.id : (m.assignee === 'other' ? 'other-user' : m.assignee) }));
    STATE.mock = true;
  }
  render();

  // 診斷:抓「空清單但無錯誤」的兩種前端↔DB 情形(RLS 已確認正常)
  if (!STATE.mock){
    const KNOWN = ['submitted','in_progress','need_info','resolved','confirmed'];
    const statuses = [...new Set(STATE.tickets.map(x => x.status))];
    console.info(`[tickets] loaded ${STATE.tickets.length} 列;登入者=${STATE.me.employee_id}/${STATE.me.medsec_role};status 值=`, statuses);
    if (STATE.tickets.length === 0){
      toast(`讀到 0 列(登入 ${STATE.me.employee_id})。REST 端可能沒帶 JWT / schema cache 未刷新`, 'err');
    } else if (!STATE.tickets.some(x => KNOWN.includes(x.status))){
      toast(`讀到 ${STATE.tickets.length} 列但 status 值不吻合(${statuses.join('/')});核對 status 欄名/值`, 'err');
    }
  }
})();
</script>
