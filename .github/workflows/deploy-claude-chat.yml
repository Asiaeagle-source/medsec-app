name: Deploy claude-chat edge function

# 自動把 supabase/functions/claude-chat 部署到 Supabase。
# 解決「AI 解析/問問題:edge function 連不到(沒部署)」的根因。
#
# 前置(一次性,在 GitHub repo Settings → Secrets and variables → Actions):
#   - SUPABASE_ACCESS_TOKEN : supabase.com/dashboard/account/tokens 產生的 access token
# 注意:ANTHROPIC_API_KEY 不放這裡。它是 Supabase 端 secret,須由
#   Lynn 一次性執行:supabase secrets set ANTHROPIC_API_KEY=sk-ant-...
#   (CI 只負責部署 function 程式碼,不碰 API 金鑰)

on:
  push:
    branches: ["**"]
    paths:
      - "supabase/functions/claude-chat/**"
      - ".github/workflows/deploy-claude-chat.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-claude-chat
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: yincuegybnuzgojakkuc
    steps:
      - uses: actions/checkout@v4

      - name: Guard — SUPABASE_ACCESS_TOKEN 未設定就清楚報錯
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::缺少 repo secret SUPABASE_ACCESS_TOKEN。請到 Settings → Secrets and variables → Actions 新增後重跑。"
            exit 1
          fi

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy claude-chat
        run: supabase functions deploy claude-chat --project-ref "$PROJECT_REF"

      - name: 提醒(若尚未設 ANTHROPIC_API_KEY)
        if: always()
        run: |
          echo "已部署 claude-chat。若 AI 仍回 500/config missing,"
          echo "代表尚未設定 Anthropic 金鑰,請執行一次:"
          echo "  supabase secrets set ANTHROPIC_API_KEY=sk-ant-... --project-ref $PROJECT_REF"
