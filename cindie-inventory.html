<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AE MED Hub · 產品庫存 / 停產</title>
<link rel="stylesheet" href="medsec-common.css">
<style>
  .cm-toolbar { display:flex; gap:10px; align-items:center; margin:14px 0; flex-wrap:wrap; }
  .cm-toolbar .spacer { flex:1; }
  #cm-dropzone { border:2px dashed #cbd5e1; border-radius:8px; padding:18px;
    text-align:center; color:#64748b; font-size:13px; cursor:pointer; }
  #cm-dropzone.dz-over { border-color:#6366f1; background:#eef2ff; }
</style>
</head>
<body>
<div class="app-shell">
  <main class="main" style="margin-left:0">
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:center">
      <div><div class="breadcrumb" id="cm-bc">—</div><h1 id="cm-h1">—</h1></div>
      <div style="font-size:13px"><span id="cm-user">—</span> · <a href="cindie.html">回採購</a></div>
    </div>

    <div id="cm-season-banner" style="margin:10px 0;padding:12px 16px;border-radius:8px;
      background:#eef2ff;border:1px solid #c7d2fe;font-size:14px">載入季節資訊…</div>

    <div class="rc-question-help" style="margin:10px 0;line-height:1.7">
      ℹ️ 這是 <b>Cindie 維護的副本</b>,真實庫存在鼎新,用於業祕報價警示 + 訂貨建議,Sprint 3 接鼎新每日 ETL。<br>
      📊 月銷歷史視窗:<b>rolling 18 個月</b>,系統自動淘汰更舊的資料。<br>
      🆕 第一次使用請上傳過去 16 個月明細的 Excel(月份表頭範例:<code>202501, 202502, …, 202604</code>);之後每月只需上傳當月 1 列即可(系統自動合併)。
    </div>

    <div class="cm-toolbar">
      <button class="btn-primary" style="width:auto;padding:8px 16px" onclick="cmOpenUpload()">📥 上傳 Excel</button>
      <button class="btn-secondary" style="width:auto;padding:8px 16px" onclick="cmNew()">+ 新增單筆</button>
      <span class="spacer"></span>
      <input id="cm-search" class="rc-text-input" style="width:200px;padding:7px" placeholder="🔍 搜尋品號…" oninput="loadRows()">
      <span id="cm-count" style="font-size:13px;color:var(--text-muted)">—</span>
    </div>
    <div id="cm-filters" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px"></div>

    <table class="case-list">
      <thead id="cm-thead"></thead>
      <tbody id="cm-tbody"></tbody>
    </table>
  </main>
</div>

<!-- 上傳 modal -->
<div id="cm-upload-modal" class="modal-overlay" hidden>
  <div class="modal" style="max-width:760px">
    <div class="modal-header"><div class="modal-title">上傳產品庫存 / 停產</div>
      <button class="modal-close" onclick="document.getElementById('cm-upload-modal').hidden=true">×</button></div>
    <div class="modal-body">
      <div id="cm-dropzone" onclick="document.getElementById('cm-file').click()">
        把 .xlsx / .csv 拖到這裡,或點此選檔
        <input type="file" id="cm-file" accept=".xlsx,.xls,.csv" hidden
          onchange="cmHandleFile(this.files[0])">
      </div>
      <div style="text-align:center;font-size:12px;color:#94a3b8;margin:8px 0">或直接貼上 Excel 內容(含表頭)</div>
      <textarea id="cm-up-paste" class="rc-text-input" rows="5" placeholder="從 Excel 複製整塊貼這裡"></textarea>
      <div style="text-align:right;margin-top:8px">
        <button class="btn-secondary" style="width:auto;padding:6px 14px" onclick="cmParsePasted()">解析預覽</button>
      </div>
      <div id="cm-up-preview" style="margin-top:12px"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="document.getElementById('cm-upload-modal').hidden=true">取消</button>
      <button class="btn-primary" id="cm-up-apply" style="width:auto;padding:6px 16px" disabled onclick="cmApply()">套用</button>
    </div>
  </div>
</div>

<!-- 單筆編輯 modal -->
<div id="cm-edit-modal" class="modal-overlay" hidden>
  <div class="modal" style="max-width:480px">
    <div class="modal-header"><div class="modal-title" id="cm-edit-title">編輯</div>
      <button class="modal-close" onclick="document.getElementById('cm-edit-modal').hidden=true">×</button></div>
    <div class="modal-body" id="cm-edit-body"></div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="document.getElementById('cm-edit-modal').hidden=true">取消</button>
      <button class="btn-primary" style="width:auto;padding:6px 16px" onclick="cmSaveEdit()">儲存</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="medsec-common.js"></script>
<script src="cindie-maintain.js"></script>
<script>
function cmNum(v) { return v == null || v === '' ? 0 : Number(v) || 0; }
// view 的 stock_alert_level 是 "🔴 嚴重缺貨" 這種帶 emoji 字串
const CM_LVL_COLOR = { '🔴':'#dc2626', '🟠':'#ea580c', '🟡':'#ca8a04', '🟢':'#16a34a', '⚫':'#475569' };
function cmLvlEmoji(r) { return (r.stock_alert_level || '🟢').trim().charAt(0); }
const SEASON_TXT = { peak:'旺季', normal:'一般', low:'淡季' };
let SEASON_MAP = {};
// 顯示用四捨五入:≥1 取 1 位小數;0<x<1 取 2 位(更細);0 顯示 0;空值 —
function cmRound(v) {
  if (v == null || v === '') return '—';
  const n = Number(v);
  if (!isFinite(n)) return '—';
  if (n === 0) return '0';
  if (Math.abs(n) < 1) return String(Math.round(n * 100) / 100);
  return String(Math.round(n * 10) / 10);
}

const CINDIE_CFG = {
  table: 'medsec_product_inventory',
  title: '產品採購庫存',
  breadcrumb: 'MedSec Hub / 採購 / 產品採購庫存',
  uploadStamp: 'last_excel_update',
  // 全欄(解析 + 單筆編輯用;label 短、aliases 對 Cindie 真實 Excel 中文表頭)
  columns: [
    { key:'product_category', label:'分類', aliases:['產品分類'] },
    { key:'product_code', label:'品號', required:true, aliases:['品號'] },
    { key:'overdue_inbound_qty', label:'逾期未進貨', type:'int', aliases:['逾期未進貨','逾期'] },
    { key:'pending_inbound_qty', label:'待進貨數量', type:'int', aliases:['待進貨數量','待進貨'] },
    { key:'pending_purchase_qty', label:'採購未確認', type:'int', aliases:['採購未確認'] },
    { key:'current_stock_qty', label:'現有數', type:'num', aliases:['現有數','現有','目前庫存'] },
    { key:'monthly_avg_sales', label:'月均銷', type:'num', aliases:['月均銷'] },
    { key:'available_months', label:'可用月數', type:'num', aliases:['可用月數'] },
    { key:'product_name', label:'品名', aliases:['品名'] },
    { key:'safety_stock_months', label:'安全庫存(月)', type:'num' },
    { key:'safety_stock_level', label:'安全庫存(量)', type:'num' },
    { key:'stock_status', label:'手動狀態(override)', type:'enum',
      options:['','normal','low','out','discontinued'] },
    { key:'is_discontinued', label:'已停產', type:'bool', aliases:['停產'] },
    { key:'discontinue_date', label:'停產日', type:'date' },
    { key:'replacement_product_code', label:'替代品號' },
    { key:'notes', label:'備註' },
  ],
  // 顯示讀智慧 view(同期/季節調整),寫仍 medsec_product_inventory
  readView: 'v_inventory_intelligence',
  orderBy: 'product_code', orderAsc: true,
  captureMonthly: true, monthlyField: 'monthly_sales_history',
  // 列表:品號|品名|分類|有效|近3月銷|同期(去年)|YoY 比較|狀態|訂量建議
  listColumns: [
    { key:'product_code', label:'品號' },
    { key:'product_name', label:'品名' },
    { key:'product_category', label:'分類' },
    { derived:'eff', label:'有效' },
    { key:'recent_3m_avg', label:'近3月銷', fmt:cmRound },
    { key:'yoy_3m_avg', label:'同期(去年)', fmt:cmRound },
    { key:'yoy_trend', label:'YoY 比較' },
    { derived:'alert', label:'狀態' },
    { derived:'reorder', label:'訂量建議' },
  ],
  filters: [
    { key:'all',  label:'全部' },
    { key:'🔴',   label:'🔴 嚴重缺貨', match:r=>cmLvlEmoji(r)==='🔴' },
    { key:'🟠',   label:'🟠 即將缺貨', match:r=>cmLvlEmoji(r)==='🟠' },
    { key:'🟡',   label:'🟡 低於訂購點', match:r=>cmLvlEmoji(r)==='🟡' },
    { key:'🟢',   label:'🟢 正常',     match:r=>cmLvlEmoji(r)==='🟢' },
    { key:'⚫',   label:'⚫ 停產',     match:r=>cmLvlEmoji(r)==='⚫' },
  ],
  derived: {
    eff(r) {
      const eff = cmNum(r.effective_supply);
      const m = cmNum(r.recent_3m_avg);
      const sub = m > 0 ? `約 ${(eff / m).toFixed(1)} 月` : '無近期銷';
      return `<b>${eff}</b><br><small style="color:#94a3b8">(逾期+現有, ${sub})</small>`;
    },
    alert(r) {
      const lv = r.stock_alert_level || '🟢 正常';
      const c = CM_LVL_COLOR[lv.trim().charAt(0)] || '#16a34a';
      const ov = r.stock_status ? `<br><small style="color:#94a3b8">手動:${r.stock_status}</small>` : '';
      return `<span style="color:${c};font-weight:600">${lv}</span>${ov}`;
    },
    reorder(r) {
      const arp = r.adjusted_reorder_point;
      const nf = r.next_month_forecast;
      return `<b>${arp == null ? '—' : arp}</b>`
        + `<br><small style="color:#94a3b8">預測下月 ${nf == null ? '—' : nf}</small>`;
    },
  },
  expandRow(r) {
    const h = r.monthly_sales_history || {};
    const keys = Object.keys(h).sort();
    if (keys.length === 0) return '<div style="padding:8px;color:#94a3b8">無月銷歷史(請上傳含 YYYYMM 月欄的 Excel)</div>';
    const vals = keys.map(k => Number(h[k]) || 0);
    const max = Math.max(1, ...vals);
    const bars = keys.map((k, i) => {
      const mn = +k.slice(5, 7);
      const sea = (SEASON_MAP[mn] || {}).season || 'normal';
      const bg = sea === 'peak' ? '#fee2e2' : sea === 'low' ? '#dbeafe' : 'transparent';
      const hpx = Math.round((vals[i] / max) * 60) + 2;
      return `<div title="${k}: ${vals[i]}（${SEASON_TXT[sea]}）"
        style="display:inline-flex;flex-direction:column;align-items:center;width:34px;background:${bg};padding:2px 0">
        <div style="flex:1;display:flex;align-items:flex-end;height:64px">
          <div style="width:16px;background:#6366f1;height:${hpx}px;border-radius:2px"></div></div>
        <small style="font-size:9px;color:#64748b">${k.slice(2)}</small></div>`;
    }).join('');
    return `<div style="padding:8px 4px"><div style="font-size:12px;color:#64748b;margin-bottom:4px">
      月銷 ${keys.length} 個月(<span style="background:#fee2e2;padding:0 4px">旺</span>
      <span style="background:#dbeafe;padding:0 4px">淡</span>)</div>
      <div style="display:flex;gap:2px;overflow-x:auto">${bars}</div></div>`;
  },
};

async function loadSeasonBanner() {
  const { data } = await supa.from('medsec_seasonal_calendar')
    .select('month_num, season, season_label, reorder_multiplier');
  (data || []).forEach(s => { SEASON_MAP[s.month_num] = s; });
  const mn = new Date().getMonth() + 1;
  const s = SEASON_MAP[mn];
  const el = document.getElementById('cm-season-banner');
  if (!el) return;
  if (!s) { el.textContent = `${mn} 月 · 尚未設定季節月曆`; return; }
  const emoji = s.season === 'peak' ? '🔥' : s.season === 'low' ? '❄️' : '🌿';
  el.innerHTML = `${emoji} <b>${mn} 月 · ${s.season_label || SEASON_TXT[s.season]}</b>`
    + `(${SEASON_TXT[s.season]}採購節奏,係數 ${s.reorder_multiplier}×)`
    + ` <small style="color:#64748b">　系統依月份自動調整訂貨建議量</small>`;
}

initCindieMaintain(CINDIE_CFG).then(() => { cmBindDrop(); loadSeasonBanner(); });
</script>
</body>
</html>
