<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AE MED Hub · 產品庫存 / 停產</title>
<link rel="stylesheet" href="medsec-common.css">
<style>
  .cm-toolbar { display:flex; gap:10px; align-items:center; margin:14px 0; flex-wrap:wrap; }
  .cm-toolbar .spacer { flex:1; }
  #cm-dropzone { border:2px dashed #cbd5e1; border-radius:8px; padding:18px;
    text-align:center; color:#64748b; font-size:13px; cursor:pointer; }
  #cm-dropzone.dz-over { border-color:#6366f1; background:#eef2ff; }
</style>
</head>
<body>
<div class="app-shell">
  <main class="main" style="margin-left:0">
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:center">
      <div><div class="breadcrumb" id="cm-bc">—</div><h1 id="cm-h1">—</h1></div>
      <div style="font-size:13px"><span id="cm-user">—</span> · <a href="cindie.html">回採購</a></div>
    </div>

    <div class="rc-question-help" style="margin:10px 0;line-height:1.6">
      ℹ️ 這是 <b>Cindie 維護的副本</b>,真實庫存在鼎新。用於業祕報價警示 + 訂貨建議。
      Sprint 3 將接鼎新每日 ETL 自動同步。
    </div>

    <div class="cm-toolbar">
      <button class="btn-primary" style="width:auto;padding:8px 16px" onclick="cmOpenUpload()">📥 上傳 Excel</button>
      <button class="btn-secondary" style="width:auto;padding:8px 16px" onclick="cmNew()">+ 新增單筆</button>
      <span class="spacer"></span>
      <input id="cm-search" class="rc-text-input" style="width:200px;padding:7px" placeholder="🔍 搜尋品號…" oninput="loadRows()">
      <span id="cm-count" style="font-size:13px;color:var(--text-muted)">—</span>
    </div>
    <div id="cm-filters" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px"></div>

    <table class="case-list">
      <thead id="cm-thead"></thead>
      <tbody id="cm-tbody"></tbody>
    </table>
  </main>
</div>

<!-- 上傳 modal -->
<div id="cm-upload-modal" class="modal-overlay" hidden>
  <div class="modal" style="max-width:760px">
    <div class="modal-header"><div class="modal-title">上傳產品庫存 / 停產</div>
      <button class="modal-close" onclick="document.getElementById('cm-upload-modal').hidden=true">×</button></div>
    <div class="modal-body">
      <div id="cm-dropzone" onclick="document.getElementById('cm-file').click()">
        把 .xlsx / .csv 拖到這裡,或點此選檔
        <input type="file" id="cm-file" accept=".xlsx,.xls,.csv" hidden
          onchange="cmHandleFile(this.files[0])">
      </div>
      <div style="text-align:center;font-size:12px;color:#94a3b8;margin:8px 0">或直接貼上 Excel 內容(含表頭)</div>
      <textarea id="cm-up-paste" class="rc-text-input" rows="5" placeholder="從 Excel 複製整塊貼這裡"></textarea>
      <div style="text-align:right;margin-top:8px">
        <button class="btn-secondary" style="width:auto;padding:6px 14px" onclick="cmParsePasted()">解析預覽</button>
      </div>
      <div id="cm-up-preview" style="margin-top:12px"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="document.getElementById('cm-upload-modal').hidden=true">取消</button>
      <button class="btn-primary" id="cm-up-apply" style="width:auto;padding:6px 16px" disabled onclick="cmApply()">套用</button>
    </div>
  </div>
</div>

<!-- 單筆編輯 modal -->
<div id="cm-edit-modal" class="modal-overlay" hidden>
  <div class="modal" style="max-width:480px">
    <div class="modal-header"><div class="modal-title" id="cm-edit-title">編輯</div>
      <button class="modal-close" onclick="document.getElementById('cm-edit-modal').hidden=true">×</button></div>
    <div class="modal-body" id="cm-edit-body"></div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="document.getElementById('cm-edit-modal').hidden=true">取消</button>
      <button class="btn-primary" style="width:auto;padding:6px 16px" onclick="cmSaveEdit()">儲存</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="medsec-common.js"></script>
<script src="cindie-maintain.js"></script>
<script>
const CM_STATUS = {
  discontinued: { e:'⚫', t:'停產',     c:'#475569' },
  critical:     { e:'🔴', t:'嚴重缺貨', c:'#dc2626' },
  low:          { e:'🟠', t:'即將缺貨', c:'#ea580c' },
  warning:      { e:'🟡', t:'庫存偏低', c:'#ca8a04' },
  normal:       { e:'🟢', t:'正常',     c:'#16a34a' },
};
function cmNum(v) { return v == null || v === '' ? 0 : Number(v) || 0; }
function cmLvl(r) { return r.stock_alert_level || 'normal'; }
// 顯示用四捨五入:≥1 取 1 位小數;0<x<1 取 2 位(更細);0 顯示 0;空值 —
function cmRound(v) {
  if (v == null || v === '') return '—';
  const n = Number(v);
  if (!isFinite(n)) return '—';
  if (n === 0) return '0';
  if (Math.abs(n) < 1) return String(Math.round(n * 100) / 100);
  return String(Math.round(n * 10) / 10);
}

const CINDIE_CFG = {
  table: 'medsec_product_inventory',
  title: '產品採購庫存',
  breadcrumb: 'MedSec Hub / 採購 / 產品採購庫存',
  uploadStamp: 'last_excel_update',
  // 全欄(解析 + 單筆編輯用;label 短、aliases 對 Cindie 真實 Excel 中文表頭)
  columns: [
    { key:'product_category', label:'分類', aliases:['產品分類'] },
    { key:'product_code', label:'品號', required:true, aliases:['品號'] },
    { key:'overdue_inbound_qty', label:'逾期未進貨', type:'int', aliases:['逾期未進貨','逾期'] },
    { key:'pending_inbound_qty', label:'待進貨數量', type:'int', aliases:['待進貨數量','待進貨'] },
    { key:'pending_purchase_qty', label:'採購未確認', type:'int', aliases:['採購未確認'] },
    { key:'current_stock_qty', label:'現有數', type:'num', aliases:['現有數','現有','目前庫存'] },
    { key:'monthly_avg_sales', label:'月均銷', type:'num', aliases:['月均銷'] },
    { key:'available_months', label:'可用月數', type:'num', aliases:['可用月數'] },
    { key:'product_name', label:'品名', aliases:['品名'] },
    { key:'safety_stock_months', label:'安全庫存(月)', type:'num' },
    { key:'safety_stock_level', label:'安全庫存(量)', type:'num' },
    { key:'stock_status', label:'手動狀態(override)', type:'enum',
      options:['','normal','low','out','discontinued'] },
    { key:'is_discontinued', label:'已停產', type:'bool', aliases:['停產'] },
    { key:'discontinue_date', label:'停產日', type:'date' },
    { key:'replacement_product_code', label:'替代品號' },
    { key:'notes', label:'備註' },
  ],
  // 列表:品號|品名|分類|逾期|待進貨|採購未確認|現有|有效供應|月均銷|可用月數|狀態
  listColumns: [
    { key:'product_code', label:'品號' },
    { key:'product_name', label:'品名' },
    { key:'product_category', label:'分類' },
    { key:'overdue_inbound_qty', label:'逾期' },
    { key:'pending_inbound_qty', label:'待進貨' },
    { key:'pending_purchase_qty', label:'採購未確認' },
    { key:'current_stock_qty', label:'現有' },
    { derived:'effective', label:'有效供應' },
    { key:'monthly_avg_sales', label:'月均銷', fmt:cmRound },
    { key:'available_months', label:'可用月數', fmt:cmRound },
    { derived:'status', label:'狀態' },
  ],
  filters: [
    { key:'all',          label:'全部' },
    { key:'critical',     label:'🔴 缺貨',     match:r=>cmLvl(r)==='critical' },
    { key:'low',          label:'🟠 即將缺貨', match:r=>cmLvl(r)==='low' },
    { key:'warning',      label:'🟡 偏低',     match:r=>cmLvl(r)==='warning' },
    { key:'normal',       label:'🟢 正常',     match:r=>cmLvl(r)==='normal' },
    { key:'discontinued', label:'⚫ 停產',     match:r=>cmLvl(r)==='discontinued' },
  ],
  derived: {
    effective(r) {
      const eff = r.effective_supply != null
        ? Number(r.effective_supply)
        : cmNum(r.overdue_inbound_qty) + cmNum(r.current_stock_qty);
      const m = cmNum(r.monthly_avg_sales);
      const sub = m > 0 ? `約 ${(eff / m).toFixed(1)} 月銷量` : '無月均銷';
      return `<b>${eff}</b><br><small style="color:#94a3b8">(逾期+現有, ${sub})</small>`;
    },
    status(r) {
      const s = CM_STATUS[cmLvl(r)] || CM_STATUS.normal;
      const ov = r.stock_status ? ` <small style="color:#94a3b8">(手動:${r.stock_status})</small>` : '';
      return `<span style="color:${s.c};font-weight:600">${s.e} ${s.t}</span>${ov}`;
    },
  },
};
initCindieMaintain(CINDIE_CFG).then(cmBindDrop);
</script>
</body>
</html>
